services:
  app:
    container_name: ibshi-amin-app
    # Server lấy image build sẵn từ ghcr.io (GitHub Action auto deploy).
    # Nếu cần build tại chỗ (dev/CI), comment dòng `image:` và bật khối `build:`.
    image: ghcr.io/liberico-ai/ibshi-amin:main
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "7140:3000" # Cân bằng tải nếu dùng Nginx (VD: "127.0.0.1:3000:3000")
    env_file: .env
    restart: unless-stopped
    # Postgres + MinIO chạy sẵn trên host → app truy cập qua host.docker.internal
    # (Linux: bật extra_hosts bên dưới).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
